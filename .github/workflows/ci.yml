name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - run: dotnet restore McpWorkbench.slnx --locked-mode
      - run: dotnet format McpWorkbench.slnx --verify-no-changes --no-restore
      - run: dotnet build McpWorkbench.slnx -c Release --no-restore
      - run: dotnet test McpWorkbench.slnx -c Release --no-build
      - run: dotnet publish src/McpWorkbench/McpWorkbench.csproj -c Release -r linux-x64 --self-contained true --no-restore
